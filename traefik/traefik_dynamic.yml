# Traefik dynamic configuration for HTTPS
http:
  routers:
    grafana:
      rule: "Host(`${WIS2NODE_MONITOR_URL#https://}`)"
      entryPoints:
        - websecure
      service: grafana
      tls:
        certResolver: myresolver
  services:
    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"
