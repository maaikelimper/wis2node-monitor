#
# template to enable metrics-collector and prometheus services
#      

services:
  
  wis2node-monitor-china:
    build: 
      context: ./mqtt-metrics-collector
    restart: unless-stopped
    environment:
      - BROKER_HOST=gb.wis.cma.cn
      - BROKER_PORT=8883
      - BROKER_USERNAME=everyone
      - BROKER_PASSWORD=everyone
      - BROKER_TRANSPORT=tcp
      - LOGGING_LEVEL=${LOGGING_LEVEL:-INFO}
  wis2node-monitor-brazil:
    build: 
      context: ./mqtt-metrics-collector
    restart: unless-stopped
    environment:
      - BROKER_HOST=globalbroker.inmet.gov.br
      - BROKER_PORT=443
      - BROKER_USERNAME=everyone
      - BROKER_PASSWORD=everyone
      - BROKER_TRANSPORT=websockets
      - LOGGING_LEVEL=${LOGGING_LEVEL:-INFO}

  wis2node-monitor-france:
    build: 
      context: ./mqtt-metrics-collector
    restart: unless-stopped
    environment:
      - BROKER_HOST=globalbroker.meteo.fr
      - BROKER_PORT=443
      - BROKER_USERNAME=everyone
      - BROKER_PASSWORD=everyone
      - BROKER_TRANSPORT=websockets
      - LOGGING_LEVEL=${LOGGING_LEVEL:-INFO}

  wis2node-monitor-usa:
    build: 
      context: ./mqtt-metrics-collector
    restart: unless-stopped
    environment:
      - BROKER_HOST=wis2broker.globaldata.nws.noaa.gov
      - BROKER_PORT=8883
      - BROKER_USERNAME=everyone
      - BROKER_PASSWORD=everyone
      - BROKER_TRANSPORT=tcp
      - LOGGING_LEVEL=${LOGGING_LEVEL:-INFO}

  prometheus:
    image: prom/prometheus:v2.37.0
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=365d'
      - '--log.level=warn'
  
  grafana:
    image: grafana/grafana:12.3
    restart: unless-stopped
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${WIS2NODE_MONITOR_HOST}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=myresolver"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - 80:80
      - 443:443
    volumes:
      - traefik-letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  prometheus-data:
  traefik-letsencrypt:
  grafana-data: